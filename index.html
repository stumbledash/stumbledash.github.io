<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumble Dash</title>

    <!-- FAVICON: Carrega o arquivo da sua pasta raiz no GitHub -->
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Lilita One', cursive !important;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            /* Estética Aero Glass/Blur */
            background: 
                linear-gradient(rgba(123, 0, 255, 0.5), rgba(61, 0, 102, 0.5)),
                url('https://win32subsystem.live/supermium/images/blurred-abstract.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
            color: white;
        }

        /* CAMADA DA PEGADINHA (PRANK) */
        #prankLayer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #prankText {
            color: black;
            font-size: 70px;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #exitBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            border: 3px solid black;
            padding: 10px 25px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10000;
        }

        /* NAVEGAÇÃO */
        nav {
            position: absolute;
            top: 20px;
            display: flex; gap: 30px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.15); 
            padding-bottom: 5px;
            z-index: 10;
        }

        nav a { color: white; text-decoration: none; font-size: 24px; text-shadow: 2px 2px 0px black; cursor: pointer; padding: 0 15px; }
        nav a.active { color: #d580ff; transform: scale(1.1); }

        /* CONTEÚDO */
        .tab-content { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; animation: fadeIn 0.3s ease-in; }
        .tab-content.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 88px; margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px #d580ff, 0 0 25px #d580ff, 5px 5px 0px black; }
        h2 { margin-top: 18px; font-size: 38px; text-shadow: 0 0 10px #ffffff, 3px 3px 0px black; }

        /* BOTÕES */
        .container-buttons { display: flex; gap: 40px; margin-top: 35px; }
        .btn-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }

        .btn {
            display: inline-block;
            background: #008cff; color: white; border: 4px solid black;
            padding: 16px 42px; font-size: 24px; border-radius: 16px;
            text-decoration: none; transition: 0.2s;
            box-shadow: 0 0 15px #00aaff, 4px 4px 0px black;
        }
        .btn:hover { transform: scale(1.08); cursor: pointer; }

        .support-info { font-size: 14px; display: flex; align-items: center; gap: 8px; text-shadow: 2px 2px 0px black; }
        .support-info img { width: 18px; height: 18px; }

        /* CONFIGURAÇÕES */
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
            background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; border: 3px solid black;
        }
        .setting-item { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        select, input[type="range"] {
            padding: 8px; border-radius: 8px; border: 2px solid black;
            background: #008cff; color: white; cursor: pointer; width: 100%;
        }

        footer { position: absolute; bottom: 15px; text-shadow: 2px 2px 0px black; opacity: 0.8; }

        /* CELULAR */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; padding: 100px 0 60px 0; }
            nav { gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; top: 10px; }
            nav a { font-size: 18px; padding: 0 8px; }
            h1 { font-size: 48px; }
            h2 { font-size: 26px; }
            .container-buttons { flex-direction: column; gap: 25px; width: 90%; }
            .btn { width: 100%; text-align: center; }
            .settings-grid { grid-template-columns: 1fr; width: 90%; }
            #prankText { font-size: 32px; gap: 10px; }
        }
    </style>
</head>

<body onclick="playMusic()">

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <audio id="idiotMusic" loop>
        <source src="https://www.myinstants.com/media/sounds/you-are-an-idiot.mp3" type="audio/mpeg">
    </audio>

    <div id="prankLayer">
        <button id="exitBtn" onclick="stopPrank()">Exit</button>
        <div id="prankText">
            <img src="https://img.icons8.com/ios-filled/100/000000/exit.png" alt="exit-icon">
            YOU ARE AN IDIOT! :D
        </div>
    </div>

    <nav>
        <a onclick="openTab('home', event)" id="defaultOpen">Home</a>
        <a onclick="openTab('dashboard', event)">Dashboard</a>
        <a href="https://discord.gg/BxxEzhRMMq" target="_blank">Discord</a>
        <a onclick="openTab('settings', event)">Settings</a>
    </nav>

    <!-- ABA HOME -->
    <div id="home" class="tab-content">
        <h1>Stumble Dash</h1>
        <h2>Downloads</h2>
        <div class="container-buttons">
            <div class="btn-wrapper">
                <a class="btn" href="#">Download PC</a>
                <div class="support-info">
                    <img src="https://img.icons8.com/color/48/windows-10.png" alt="Win10">
                    Supports Windows 10+
                </div>
            </div>
            <div class="btn-wrapper">
                <a class="btn" href="#">Download Phone</a>
                <div class="support-info">
                    <img src="https://img.icons8.com/color/48/android-os.png" alt="Android">
                    <img src="https://img.icons8.com/color/48/iphone.png" alt="iPhone">
                    Supports Android & iOS
                </div>
            </div>
        </div>
    </div>

    <!-- ABA DASHBOARD -->
    <div id="dashboard" class="tab-content">
        <h1>Dashboard</h1>
        <h2>Control Panel</h2>
        <div style="margin-top: 35px;">
            <a class="btn" href="#">Open Dashboard</a>
        </div>
    </div>

    <!-- ABA SETTINGS -->
    <div id="settings" class="tab-content">
        <h1>Settings</h1>
        <div class="settings-grid">
            <div class="setting-item">
                <label>Music Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume(this.value)">
            </div>
            <div class="setting-item">
                <label>Server Region</label>
                <select>
                    <option>South America</option>
                    <option>North America</option>
                    <option>Europe</option>
                    <option>Asia</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Auto-Update</label>
                <select id="autoUpdate" onchange="triggerPrank()">
                    <option value="Disabled">Disabled</option>
                    <option value="Enabled">Enabled</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Notifications</label>
                <select id="notifSelect" onchange="toggleNotifications(this.value)">
                    <option value="Off">Off</option>
                    <option value="On">On</option>
                </select>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Stumble Dash - All Rights Reserved.</footer>

    <script>
        const music = document.getElementById("bgMusic");
        const idiotMusic = document.getElementById("idiotMusic");
        const prankLayer = document.getElementById("prankLayer");
        let musicStarted = false;

        function playMusic() {
            if (!musicStarted) {
                music.volume = document.getElementById("volumeSlider").value;
                music.play().catch(() => {});
                musicStarted = true;
            }
        }

        function updateVolume(val) { music.volume = val; }

        function triggerPrank() {
            if (document.getElementById("autoUpdate").value !== "Enabled") return;
            music.pause();
            prankLayer.style.display = "flex";
            idiotMusic.currentTime = 0;
            idiotMusic.play();
            let blink = true;
            window.prankInterval = setInterval(() => {
                prankLayer.style.background = blink ? "white" : "black";
                document.getElementById("prankText").style.color = blink ? "black" : "white";
                document.querySelector("#prankText img").style.filter = blink ? "invert(0)" : "invert(1)";
                blink = !blink;
            }, 100);
        }

        function stopPrank() {
            clearInterval(window.prankInterval);
            prankLayer.style.display = "none";
            idiotMusic.pause();
            music.play();
            document.getElementById("autoUpdate").value = "Disabled";
        }

        function toggleNotifications(val) {
            if (val === "On") {
                if ("Notification" in window) {
                    Notification.requestPermission().then(p => {
                        if (p === "granted") new Notification("Stumble Dash", { body: "Notificações ativadas! 🚀" });
                    });
                }
            }
        }

        function openTab(tabName, event) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            
            const links = document.querySelectorAll("nav a");
            for (let i = 0; i < links.length; i++) links[i].classList.remove("active");
            
            document.getElementById(tabName).classList.add("active");
            if (event) event.currentTarget.classList.add("active");
        }

        // Inicia na Home corretamente
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("defaultOpen").click();
        });
    </script>
</body>
</html>
